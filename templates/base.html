<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}iCloud Inventory{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              900: '#0d1117',
              800: '#161b22',
              700: '#21262d',
              600: '#30363d',
            },
            accent: {
              400: '#58a6ff',
              500: '#1f6feb',
              600: '#1158c7',
            },
            teal: {
              400: '#39d353',
              500: '#26a641',
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
            mono: ['"SF Mono"', '"Fira Code"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0d1117; color: #e6edf3; }

    .glass {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(48, 54, 61, 0.8);
      backdrop-filter: blur(12px);
    }
    .glass-hover:hover {
      background: rgba(33, 38, 45, 0.9);
      border-color: rgba(88, 166, 255, 0.3);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    .nav-link {
      display: flex; align-items: center; gap: 0.625rem;
      padding: 0.5rem 0.875rem; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 500; color: #8b949e;
      transition: all 0.15s ease;
    }
    .nav-link:hover { background: #21262d; color: #e6edf3; }
    .nav-link.active { background: #21262d; color: #58a6ff; }

    .stat-card {
      background: linear-gradient(135deg, rgba(22,27,34,0.9) 0%, rgba(33,38,45,0.7) 100%);
      border: 1px solid rgba(48,54,61,0.8);
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(88,166,255,0.4); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 0.125rem 0.5rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 500;
    }

    /* Category colors */
    .cat-image    { background: rgba(88,166,255,0.15); color: #79c0ff; border: 1px solid rgba(88,166,255,0.3); }
    .cat-video    { background: rgba(163,113,247,0.15); color: #d2a8ff; border: 1px solid rgba(163,113,247,0.3); }
    .cat-audio    { background: rgba(57,211,83,0.15);  color: #56d364; border: 1px solid rgba(57,211,83,0.3); }
    .cat-document { background: rgba(255,163,72,0.15); color: #ffa657; border: 1px solid rgba(255,163,72,0.3); }
    .cat-code     { background: rgba(63,185,80,0.15);  color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .cat-archive  { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
    .cat-other    { background: rgba(139,148,158,0.15);color: #8b949e; border: 1px solid rgba(139,148,158,0.3); }

    .select-dark {
      background: #21262d; border: 1px solid #30363d; color: #e6edf3;
      border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;
      appearance: none; cursor: pointer; outline: none;
    }
    .select-dark:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }

    .input-dark {
      background: #21262d; border: 1px solid #30363d; color: #e6edf3;
      border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;
      outline: none; width: 100%;
    }
    .input-dark::placeholder { color: #484f58; }
    .input-dark:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }

    .btn-primary {
      background: #1f6feb; color: #fff; border: 1px solid #388bfd40;
      border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.875rem;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #388bfd; }

    .table-row:hover td { background: rgba(33,38,45,0.6); }
    .sort-btn { cursor: pointer; user-select: none; white-space: nowrap; }
    .sort-btn:hover { color: #58a6ff; }

    /* Skeleton loader */
    @keyframes shimmer {
      0%   { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #21262d 25%, #2d333b 50%, #21262d 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.25rem;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="h-full flex flex-col">

  <!-- Top nav -->
  <header class="glass sticky top-0 z-50 flex items-center justify-between px-6 py-3" style="border-left:none;border-right:none;border-top:none;">
    <div class="flex items-center gap-3">
      <!-- Logo mark -->
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#1f6feb,#58a6ff);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-5l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
      </div>
      <span class="font-semibold text-sm tracking-wide" style="color:#e6edf3;">iCloud Inventory</span>
    </div>

    <!-- Center nav -->
    <nav class="hidden md:flex items-center gap-1">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Dashboard
      </a>
      <a href="/files" class="nav-link {% if request.path == '/files' %}active{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        File Explorer
      </a>
    </nav>

    <!-- Report selector -->
    <div class="flex items-center gap-3">
      {% if reports %}
      <div class="relative">
        <select id="global-report-select" class="select-dark pr-8 text-xs" onchange="switchReport(this.value)">
          {% for r in reports %}
          <option value="{{ r.timestamp }}" {% if r.timestamp == current_ts %}selected{% endif %}>
            {{ r.label }}
          </option>
          {% endfor %}
        </select>
        <svg class="w-3.5 h-3.5 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none" style="color:#8b949e" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
      {% endif %}
    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1 overflow-auto">
    {% block content %}{% endblock %}
  </main>

  <script>
    function switchReport(ts) {
      const url = new URL(window.location.href);
      url.searchParams.set('report', ts);
      window.location.href = url.toString();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
